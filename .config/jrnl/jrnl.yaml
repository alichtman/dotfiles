auto_pull_from_git_remote_before_edit: false
auto_push_to_git_remote_after_edit: false
backup_all_jrnls_with_git: false
colors:
  body: green
  date: red
  tags: yellow
  title: blue
default_hour: 9
default_minute: 0
editor: nvim
encrypt: false
highlight: true
indent_character: '|'
journals:
  default:
    encrypt: true
    journal: ~/Documents/journals/journal.txt
  oscp:
    encrypt: true
    journal: ~/Documents/journals/oscp.txt
linewrap: auto
tagsymbols: '@'
template: false
timeformat: '%Y-%m-%d %H:%M'
version: v4.3
